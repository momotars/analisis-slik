<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Login - Analisis SLIK OJK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(83, 35, 151, .12), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255, 153, 0, .14), transparent 40%),
        #eef2f7;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.1);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: -60px;
      left: -60px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(82, 36, 152, 0.1), transparent 60%);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-title {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      margin-top: 8px;
    }

    .logo-title span {
      color: #4c1d95;
    }

    .form-label {
      font-weight: 700;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
    }

    .form-control {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: #6d28d9;
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.15);
      background: #ffffff;
    }

    .btn-login {
      background: linear-gradient(135deg, #4c1d95, #6d28d9);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-weight: 700;
      font-size: 15px;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(76, 29, 149, 0.25);
      transition: all 0.2s ease;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #431887, #5b21b6);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(76, 29, 149, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .alert {
      border-radius: 12px;
      font-size: 13px;
      padding: 12px 16px;
      border: none;
      border-left: 4px solid #dc2626;
      background: #fef2f2;
      color: #991b1b;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="login-card">
  <div class="logo-container">
    <div style="font-size: 40px; margin-bottom: 5px;">🔐</div>
    <h1 class="logo-title">Analisis <span>SLIK</span></h1>
    <div style="width: 40px; height: 3px; background: #f59e0b; margin: 8px auto 0; border-radius: 999px;"></div>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-danger">
        ⚠️ {{ messages[0] }}
      </div>
    {% endif %}
  {% endwith %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input name="username" class="form-control" placeholder="Masukkan username" required autocomplete="username">
    </div>
    
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
    </div>

    <button type="submit" class="btn btn-login w-100">Masuk</button>
  </form>

  <div class="footer-note">
    PT. BPR Dana Berkah Pusakatama · Credit Engine v1.0
  </div>
</div>

</body>
</html>
